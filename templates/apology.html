            body {
                font-family: "Playwrite IT Moderna", cursive;
                text-align: center;
                background-color: #f8f9fa;

            }
            .container {
                max-width: 600px;
                margin: 0 auto;
                padding: 40px;
                background-color: #fff;

                color: #dc3545;
                margin: 0;
            }
            p {
                font-size: 24px;

                margin: 20px 0;
            }
            a {
                display: inline-block;
                margin-top: 20px;
                padding: 10px 20px;
                background-color: #5A639C;
                color: white;
                text-decoration: none;
                border-radius: 3px;
            }
            a:hover {
                background-color: #7776B3;
            }

    </head>
    <body>
